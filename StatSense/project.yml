name: StatSense
options:
  bundleIdPrefix: com.statsense
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  StatSense:
    type: application
    platform: iOS
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    sources:
      - path: StatSense
        excludes:
          - "**/.DS_Store"
          - "DemoContent/**"
          - "Views/DemoModeView.swift"
          - "Services/QRCodeGenerator.swift"
          - "Views/QRCodeSheet.swift"
    settings:
      base:
        INFOPLIST_FILE: StatSense/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.statsense.app
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: StatSense
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        INFOPLIST_KEY_NSCameraUsageDescription: "StatSense needs camera access to capture and analyze graphs, charts, and diagrams."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_DeepSeekAPIKey: $(DEEPSEEK_API_KEY)

